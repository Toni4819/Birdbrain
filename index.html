<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BIRDBRAIN</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #credits {
    position: fixed;
    bottom: 16px;
    right: 20px;
    font-family: monospace;
    font-size: 12px;
    z-index: 10;
  }
  #credits a {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }
  #credits a:hover {
    color: rgba(255,255,255,0.9);
  }
</style>
</head>
<body>
  <video id="player" autoplay loop muted playsinline>
    <source src="./birdbrain.webm" type="video/webm">
  </video>
  <div id="credits">
    <a href="https://www.youtube.com/channel/UCDsaRDKTCsGBJMUKx-KtukA" target="_blank">Jamie Paige / JamieP</a>
  </div>
<script>
  const video = document.getElementById("player");
  video.play().catch(() => {
    document.addEventListener("click", () => video.play(), { once: true });
  });
</script>
</body>
</html>
